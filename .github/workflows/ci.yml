name: CI

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type-check (mypy)
        run: mypy .

  test:
    name: Unit & Integration tests (Python 3.12 + PostgreSQL 16)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: flowday
          POSTGRES_PASSWORD: flowday
          POSTGRES_DB: flowday
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowday"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: "postgresql+asyncpg://flowday:flowday@localhost:5432/flowday"
      REDIS_URL: "redis://localhost:6379/0"
      SECRET_KEY: "ci-not-a-secret"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Apply migrations
        run: alembic upgrade head

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Integration tests
        run: pytest tests/integration/ tests/test_health.py -v --tb=short

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Security scan (pip-audit)
        run: pip-audit

  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t flowday-backend backend/
