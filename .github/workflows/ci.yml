name: Production CI/CD Pipeline

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # STAGE 1 & 2: Lint + Type-check (Backend)
  # ──────────────────────────────────────────────
  backend-quality:
    name: "Stage 1-2: Backend Lint & Type-check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: "Stage 1: Lint (ruff check)"
        run: ruff check .
      - name: "Stage 1: Format check (ruff format)"
        run: ruff format --check .
      - name: "Stage 2: Type-check (mypy)"
        run: mypy .

  # ──────────────────────────────────────────────
  # STAGE 1 & 2: Lint + Type-check (Frontend)
  # ──────────────────────────────────────────────
  frontend-quality:
    name: "Stage 1-2: Frontend Lint & Type-check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: "Stage 1: Lint (eslint)"
        run: npm run lint
      - name: "Stage 2: Type-check (tsc)"
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # STAGE 3: Unit & Integration Tests (Backend)
  # ──────────────────────────────────────────────
  backend-tests:
    name: "Stage 3: Backend Tests"
    needs: [backend-quality]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: flowday
          POSTGRES_PASSWORD: flowday
          POSTGRES_DB: flowday
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U flowday"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "postgresql+asyncpg://flowday:flowday@localhost:5432/flowday"
      REDIS_URL: "redis://localhost:6379/0"
      SECRET_KEY: "ci-not-a-secret"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Apply migrations
        run: alembic upgrade head
      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short
      - name: Integration tests
        run: pytest tests/integration/ tests/test_health.py -v --tb=short --cov=. --cov-report=term-missing

  # ──────────────────────────────────────────────
  # STAGE 3: Unit Tests (Frontend)
  # ──────────────────────────────────────────────
  frontend-tests:
    name: "Stage 3: Frontend Tests"
    needs: [frontend-quality]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Vitest unit tests
        run: npm run test

  # ──────────────────────────────────────────────
  # STAGE 4: E2E Tests (Playwright)
  # ──────────────────────────────────────────────
  e2e-tests:
    name: "Stage 4: E2E Tests (Playwright)"
    needs: [frontend-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────
  # STAGE 5: Security Gates (4 gates)
  # ──────────────────────────────────────────────
  security-gates:
    name: "Stage 5: Security (4 Gates)"
    needs: [backend-quality, frontend-quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gate 1: pip-audit (Python dependency vulnerabilities)
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -e "./backend[dev]"
      - name: "Gate 1: pip-audit"
        run: pip-audit

      # Gate 2: npm audit (Node dependency vulnerabilities)
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: "Gate 2: npm audit"
        run: cd frontend && npm audit --audit-level=high

      # Gate 3: Gitleaks (secret detection)
      - name: "Gate 3: Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Gate 4: Bandit (Python SAST)
      - name: "Gate 4: Bandit SAST"
        run: bandit -r backend/app/ -c backend/bandit.yml

  # ──────────────────────────────────────────────
  # STAGE 6: AI PR Review (Claude Code)
  # ──────────────────────────────────────────────
  ai-review:
    name: "Stage 6: Claude AI Review"
    if: github.event_name == 'pull_request'
    needs: [backend-tests, frontend-tests, e2e-tests, security-gates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Claude PR Review
        uses: anthropic-ai/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for FlowDay. Check:
            1. Security: OAuth token handling, PII exposure, prompt injection risks
            2. Architecture: async patterns, service layer separation, no raw SQL in routes
            3. AI pipeline: agent isolation, error handling in asyncio.gather
            4. Test coverage: TDD compliance (RED/GREEN/REFACTOR commits)
            Provide actionable feedback using the C.L.E.A.R. framework.

  # ──────────────────────────────────────────────
  # STAGE 7: Preview Deploy (Vercel) — on PR
  # ──────────────────────────────────────────────
  preview-deploy:
    name: "Stage 7: Vercel Preview Deploy"
    if: github.event_name == 'pull_request'
    needs: [backend-tests, frontend-tests, e2e-tests, security-gates]
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel config
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
      - name: Build for preview
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
      - name: Deploy preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        working-directory: frontend
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed: ${{ steps.deploy.outputs.url }}`
            })

  # ──────────────────────────────────────────────
  # STAGE 8: Production Deploy (Vercel) — on main
  # ──────────────────────────────────────────────
  prod-deploy:
    name: "Stage 8: Vercel Production Deploy"
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-tests, frontend-tests, e2e-tests, security-gates]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
      - name: Deploy production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        working-directory: frontend
