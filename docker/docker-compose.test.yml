services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_USER: flowday
      POSTGRES_PASSWORD: flowday
      POSTGRES_DB: flowday_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowday"]
      interval: 10s
      timeout: 5s
      retries: 5
