name: CI

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Lint & Test (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: "postgresql+asyncpg://flowday:flowday@localhost:5432/flowday"
      REDIS_URL: "redis://localhost:6379/0"
      SECRET_KEY: "ci-not-a-secret"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -v --tb=short

